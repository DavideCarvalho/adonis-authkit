name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first (topological: core before server/client/react) so the
      # @adonis-agora/authkit-core .d.ts exist before dependents typecheck.
      - name: Build
        run: pnpm -r build

      # Packaging smoke: import every built module of each publishable package,
      # catching bugs like hard-imports that don't resolve at runtime.
      - name: Import smoke (packaging)
        run: node scripts/import-smoke.mjs

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test
