name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# NOTE: For publishing to work, the repository owner must add an `NPM_TOKEN`
# secret (an npm automation token with publish rights to the @dudousxd scope).
permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build primeiro (ordem topológica: core antes de server/client/react) para
      # que os .d.ts de @dudousxd/adonis-authkit-core existam antes do typecheck
      # dos pacotes dependentes.
      - name: Build
        run: pnpm -r build

      # Smoke de empacotamento: importa cada módulo do build de cada pacote
      # publicável, pegando bugs como hard-imports que não resolvem em runtime.
      - name: Import smoke (packaging)
        run: node scripts/import-smoke.mjs

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

  # Roda na MESMA pipeline, depois do build verde — nada publica se o CI falhar.
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Publica com provenance (proveniência verificável via OIDC; id-token: write acima).
          NPM_CONFIG_PROVENANCE: true
