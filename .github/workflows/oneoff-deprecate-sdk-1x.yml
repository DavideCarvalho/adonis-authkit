# One-off: deprecia as versões 1.x do SDK (re-baseline para 0.x).
# Remover este arquivo depois de executado.
name: Deprecate SDK 1.x

on:
  workflow_dispatch:

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm deprecate "@dudousxd/adonis-authkit-sdk@>=1.0.0 <2.0.0" "Version re-baselined to 0.x (0.4.0 = identical to 1.3.0) to match the rest of the AuthKit ecosystem. Install @dudousxd/adonis-authkit-sdk@^0.4.0."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
